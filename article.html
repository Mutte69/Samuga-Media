<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Samuga Media | Article</title>
  <meta name="description" content="Read full Samuga Media article." />
  <style>
    :root{--ink:#f5f8ff;--muted:#9aa8b8;--line:rgba(255,255,255,.1);--paper:#020305;--card:#0b1017;--blue:#28b8ff;--cyan:#11d4ff;--shadow:0 18px 50px rgba(0,0,0,.55)}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:radial-gradient(circle at 20% -10%,rgba(40,184,255,.13),transparent 28%),radial-gradient(circle at 85% 5%,rgba(17,212,255,.08),transparent 30%),var(--paper);color:var(--ink);font-family:Arial,"Noto Sans Thaana","MV Typewriter",sans-serif;line-height:1.65}a{color:inherit;text-decoration:none}.wrap{width:min(980px,calc(100% - 32px));margin-inline:auto}.top{border-bottom:1px solid var(--line);background:rgba(2,3,5,.94);backdrop-filter:blur(16px)}.top-inner{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 0}.brand{display:flex;align-items:center;gap:12px;font-weight:900}.brand img{width:54px;height:54px;border-radius:50%;filter:drop-shadow(0 0 18px rgba(40,184,255,.4))}.nav{display:flex;gap:12px;flex-wrap:wrap}.btn{border:1px solid rgba(40,184,255,.35);border-radius:999px;padding:9px 14px;color:#dff6ff;background:rgba(40,184,255,.08);font-weight:900}.btn.primary{background:var(--blue);color:#00111c;border-color:var(--blue)}main{padding:34px 0 54px}.article-shell{background:linear-gradient(180deg,var(--card),#070b11);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);overflow:hidden}.hero{padding:clamp(26px,5vw,56px);border-bottom:1px solid var(--line);background:radial-gradient(circle at 80% 20%,rgba(40,184,255,.16),transparent 32%)}.article-banner{margin:24px clamp(26px,5vw,56px) 0;padding:18px;border:1px solid var(--line);border-radius:20px;background:linear-gradient(180deg,#0b1017,#070b11)}.article-banner-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.article-banner-top strong{font-size:14px;letter-spacing:.5px;color:var(--blue);text-transform:uppercase}.article-banner-badge{color:var(--muted);font-size:11px;font-weight:900;letter-spacing:.6px;text-transform:uppercase;border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:3px 8px}.article-banner-frame{display:block;border:1px solid rgba(40,184,255,.22);border-radius:16px;overflow:hidden;background:#02070d;aspect-ratio:16/7}.article-banner-frame img{width:100%;height:100%;object-fit:cover}.article-banner-copy{margin-top:12px;color:var(--muted)}.eyebrow{color:var(--blue);font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:.7px}.meta{margin-top:14px;color:var(--muted);font-weight:800;display:flex;gap:10px;flex-wrap:wrap}.title{font-size:clamp(36px,6vw,72px);line-height:1.04;letter-spacing:-2px;margin:14px 0 0}.excerpt{font-size:20px;color:var(--muted);max-width:780px;margin-top:18px}.body{padding:clamp(24px,5vw,56px);font-size:20px}.body p{margin:0 0 22px;color:#e9f3ff}.body p:first-child{font-size:23px;color:#fff}.cta{margin-top:28px;padding:22px;border:1px solid rgba(40,184,255,.22);border-radius:18px;background:rgba(40,184,255,.08);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}.related{padding:0 clamp(24px,5vw,56px) clamp(26px,5vw,56px)}.related h2{font-size:28px;margin:0 0 14px}.related-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.related-card{border:1px solid var(--line);border-radius:16px;background:#070c12;padding:18px}.related-card span{color:var(--blue);font-weight:900;font-size:12px;text-transform:uppercase}.related-card h3{font-size:20px;line-height:1.25;margin:8px 0 8px}.related-card p{color:var(--muted);margin:0}.loading,.error{padding:40px;color:var(--muted)}.footer{border-top:1px solid var(--line);padding:24px 0;color:var(--muted)}.dv{direction:rtl;text-align:right}@media(max-width:700px){.top-inner{align-items:flex-start;flex-direction:column}.related-grid{grid-template-columns:1fr}.body{font-size:18px}.body p:first-child{font-size:20px}.title{letter-spacing:-1px}}
  </style>
</head>
<body>
  <header class="top">
    <div class="wrap top-inner">
      <a class="brand" href="index.html"><img src="assets/SamugaNewsBot_Profile.png" alt=""><span>Samuga Media</span></a>
      <nav class="nav"><a class="btn" href="index.html#latest">Latest</a><a class="btn primary" href="https://t.me/samugacommunity" target="_blank" rel="noopener">Join Community</a></nav>
    </div>
  </header>
  <main class="wrap">
    <article class="article-shell" id="article"><div class="loading">Loading Samuga article...</div></article>
  </main>
  <footer class="footer"><div class="wrap">Samuga Media • Live Maldives news powered by Samuga AI</div></footer>
  <script>
    const BOT_API_BASE = "https://samuga-news-bot-production.up.railway.app";
    const articleEl = document.getElementById('article');
    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    const esc = s => String(s || '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;');
    async function loadBanner(){
      try{
        const res = await fetch(`${BOT_API_BASE}/api/banner`, {cache:'no-store'});
        if(!res.ok) throw new Error('banner api error');
        const data = await res.json();
        if(data && data.active && data.image_url){
          return data;
        }
      }catch(e){}
      return null;
    }

    async function loadArticle(){
      if(!id){ articleEl.innerHTML = '<div class="error">Article not found.</div>'; return; }
      try{
        const res = await fetch(`${BOT_API_BASE}/api/article?id=${encodeURIComponent(id)}`, {cache:'no-store'});
        const data = await res.json();
        if(!res.ok || data.error){ throw new Error(data.error || 'Article unavailable'); }
        const banner = await loadBanner();
        document.title = `${data.title} | Samuga Media`;
        const isDv = data.lang === 'dv';
        const paragraphs = (data.paragraphs && data.paragraphs.length ? data.paragraphs : String(data.body || '').split('\n\n')).filter(Boolean);
        const related = (data.related || []).map(r => `<a class="related-card" href="${esc(r.url)}"><span>${esc(r.category)}</span><h3>${esc(r.title)}</h3><p>${esc(r.summary || r.time)}</p></a>`).join('');
        articleEl.classList.toggle('dv', isDv);
        articleEl.innerHTML = `
          <header class="hero">
            <span class="eyebrow">${esc(data.category)} • ${esc(data.source || 'Samuga Media')}</span>
            <h1 class="title">${esc(data.title)}</h1>
            <div class="meta"><span>${esc(data.time)}</span><span>Samuga Article</span></div>
            ${data.excerpt ? `<p class="excerpt">${esc(data.excerpt)}</p>` : ''}
          </header>
          <section class="body">
            ${paragraphs.map(p => `<p>${esc(p)}</p>`).join('')}
            <div class="cta"><strong>Follow this story with Samuga Community</strong><a class="btn primary" href="${esc(data.community_url)}" target="_blank" rel="noopener">Join Telegram</a></div>
          </section>
          ${banner ? `<section class="article-banner"><div class="article-banner-top"><strong>Sponsored</strong><span class="article-banner-badge">Ad</span></div><a class="article-banner-frame" href="${esc(banner.link || 'https://samugamedia.com')}" target="_blank" rel="noopener"><img src="${esc(banner.image_url)}" alt="${esc(banner.text || 'Sponsored banner')}"></a>${banner.text ? `<p class="article-banner-copy">${esc(banner.text)}</p>` : ''}</section>` : ''}
          ${related ? `<section class="related"><h2>Related stories</h2><div class="related-grid">${related}</div></section>` : ''}
        `;
      }catch(e){
        articleEl.innerHTML = '<div class="error">Article unavailable right now. Please return to latest stories.</div>';
      }
    }
    loadArticle();
  </script>
</body>
</html>
