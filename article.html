<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Samuga Media | Article</title>
  <meta name="description" content="Read the latest Maldives news on Samuga Media." />
  <meta property="og:type"      content="article" />
  <meta property="og:site_name" content="Samuga Media" />
  <meta property="og:title"       content="Samuga Media" id="ogTitle" />
  <meta property="og:description" content=""                id="ogDesc" />
  <meta property="og:image"       content="assets/SamugaNewsBot_Profile.png" id="ogImage" />
  <meta name="twitter:card"       content="summary_large_image" />
  <meta name="twitter:title"      content="Samuga Media"   id="twTitle" />
  <meta name="twitter:description" content=""              id="twDesc" />
  <meta name="twitter:image"      content="assets/SamugaNewsBot_Profile.png" id="twImage" />
  <link rel="canonical" href="" id="canonicalLink" />
  <link rel="icon" href="assets/SamugaNewsBot_Profile.png" />
  <link rel="stylesheet" href="styles.css" />
  <script type="application/ld+json" id="jsonLd">{}</script>
</head>
<body>

<div class="reading-progress" aria-hidden="true">
  <div class="reading-progress-bar" id="readingBar"></div>
</div>

<header class="article-header" role="banner">
  <div class="wrap article-header-inner">
    <a class="article-header-brand" href="index.html" aria-label="Samuga Media">
      <img src="assets/Samuga_Media_Logo_Transparent.png" alt="Samuga Media"
           style="height:28px;width:auto;max-width:140px;object-fit:contain;border-radius:0;filter:drop-shadow(0 0 8px rgba(40,184,255,.2))"
           onerror="this.style.display='none'" />
    </a>
    <nav class="article-header-nav">
      <a class="header-btn" href="index.html">← Latest</a>
      <a class="header-btn primary" href="https://t.me/samugacommunity" target="_blank" rel="noopener">Join Community</a>
    </nav>
  </div>
</header>

<main class="article-main" id="articleMain">
  <div id="coverArea"></div>

  <div class="article-container">
    <div class="article-skeleton" id="articleSkeleton">
      <div class="skel-line w60" style="height:13px"></div>
      <div class="skel-line tall" style="height:72px;margin-top:8px"></div>
      <div class="skel-line w80" style="height:13px;margin-top:12px"></div>
      <div class="skel-line" style="height:13px;margin-top:5px"></div>
      <div class="skel-line w60" style="height:13px;margin-top:5px"></div>
    </div>

    <article id="articleContent" style="display:none" aria-label="Article"></article>

    <div id="articleError" style="display:none" role="alert">
      <div class="empty-state">
        <strong>Article unavailable</strong>
        <p>We could not load this story.
          <a href="index.html" style="color:var(--blue)">Return to latest stories →</a></p>
      </div>
    </div>
  </div>
</main>

<footer class="site-footer" role="contentinfo">
  <div class="wrap footer-inner">
    <div class="footer-brand">
      <img src="assets/SamugaNewsBot_Profile.png" alt="Samuga Media" loading="lazy" />
      <div>
        <div class="footer-brand-name">Samuga Media</div>
        <div class="footer-tagline">Live news, powered by Samuga AI.</div>
      </div>
    </div>
    <nav class="footer-links">
      <a href="index.html">Home</a>
      <a href="https://t.me/samugacommunity" target="_blank" rel="noopener">Community</a>
      <a href="https://t.me/Samuga_Media" target="_blank" rel="noopener">Send a Tip</a>
    </nav>
    <p class="footer-copy">© 2026 Samuga Media</p>
  </div>
</footer>

<script>
"use strict";
const API = "https://samuga-news-bot-production.up.railway.app";
const FALLBACK = "assets/SamugaNewsBot_Profile.png";
const $ = id => document.getElementById(id);
const esc = s => String(s||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");

// Reading progress
window.addEventListener("scroll",()=>{
  const total=Math.max(document.body.scrollHeight,document.documentElement.scrollHeight)-innerHeight;
  const bar=$("readingBar");
  if(bar) bar.style.width=(total>0?Math.min(100,scrollY/total*100):0)+"%";
},{passive:true});

// Helpers
function setMeta(id,val){const el=$(id);if(el)el.setAttribute(el.tagName==="LINK"?"href":"content",val);}
function fmtDate(raw){
  if(!raw)return"";
  if(/[a-zA-Z]{3}/.test(raw)&&!raw.includes("T"))return raw;
  try{
    const d=new Date(raw);
    if(isNaN(d))return raw;
    return d.toLocaleString("en-GB",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit",hour12:false})+" MVT";
  }catch{return raw;}
}
const CAT_EN={BREAKING:"Breaking",LOCAL:"Local",POLITICAL:"Politics",BUSINESS:"Business",SPORTS:"Sports",WORLD:"World",LIFESTYLE:"Lifestyle"};
const CAT_CLASS={BREAKING:"breaking",POLITICAL:"politics",BUSINESS:"business",SPORTS:"sports",WORLD:"world",LIFESTYLE:"lifestyle"};

async function loadArticle(){
  const id=new URLSearchParams(location.search).get("id")||"";
  if(!id){showErr();return;}
  let data,banner=null;
  try{
    const r=await fetch(`${API}/api/article?id=${encodeURIComponent(id)}`,{cache:"no-store"});
    data=await r.json();
    if(!r.ok||data.error)throw Error(data.error||"not found");
  }catch(e){console.error(e);showErr();return;}
  try{
    const br=await fetch(`${API}/api/banner`,{cache:"no-store"});
    const bd=await br.json();
    if(bd?.active&&bd?.image_url)banner=bd;
  }catch{}
  render(data,banner);
}

function showErr(){$("articleSkeleton").style.display="none";$("articleError").style.display="block";}

function render(data,banner){
  $("articleSkeleton").style.display="none";
  const isDv=data.lang==="dv";
  const isBreaking=data.breaking||data.category==="BREAKING";
  const canonical=`https://samugamedia.com/article.html?id=${encodeURIComponent(data.id||"")}`;

  // SEO
  const seoTitle=data.seo?.title||data.title||"Samuga Media";
  const seoDesc=data.seo?.description||data.excerpt||"";
  const ogImg=data.cover_image||FALLBACK;
  document.title=`${seoTitle} | Samuga Media`;
  document.documentElement.lang=isDv?"dv":"en";
  document.documentElement.dir=isDv?"rtl":"ltr";
  setMeta("ogTitle",seoTitle); setMeta("ogDesc",seoDesc); setMeta("ogImage",ogImg);
  setMeta("twTitle",seoTitle); setMeta("twDesc",seoDesc); setMeta("twImage",ogImg);
  const cl=$("canonicalLink"); if(cl)cl.href=canonical;

  // JSON-LD
  $("jsonLd").textContent=JSON.stringify({
    "@context":"https://schema.org","@type":"NewsArticle",
    headline:data.title||"",description:seoDesc,
    datePublished:data.published_at||"",dateModified:data.updated_at||data.published_at||"",
    image:ogImg,url:canonical,
    publisher:{"@type":"Organization","name":"Samuga Media","logo":{"@type":"ImageObject","url":"https://samugamedia.com/assets/SamugaNewsBot_Profile.png"}},
    author:data.author?.name?{"@type":"Person","name":data.author.name}:{"@type":"Organization","name":"Samuga AI"},
    keywords:(data.seo?.keywords||[]).join(", "),articleSection:data.category||"Local"
  });

  // Cover
  const coverEl=$("coverArea");
  if(data.cover_image){
    coverEl.innerHTML=`<div class="article-cover"><img src="${esc(data.cover_image)}" alt="${esc(data.cover_caption||data.title||"")}" loading="eager" /><div class="article-cover-fade"></div>${data.cover_caption?`<div class="article-cover-cap">${esc(data.cover_caption)}</div>`:""}</div>`;
  } else {
    coverEl.innerHTML=`<div class="article-no-cover"></div>`;
  }

  // Category
  const catKey=data.category||"LOCAL";
  const catDisplay=isDv?({BREAKING:"ބްރޭކިންގ",LOCAL:"ލޯކަލް",POLITICAL:"ސިޔާސީ",BUSINESS:"އިޤްތިޞާދީ",SPORTS:"ކުޅިވަރު",WORLD:"ދުނިޔެ",LIFESTYLE:"ލައިފްސްޓައިލް"}[catKey]||catKey):(CAT_EN[catKey]||catKey);
  const catCls=CAT_CLASS[catKey]||"";

  // Author
  const author=data.author;
  const aName=author?.name||"Samuga AI";
  const aRole=author?.role||"AI Newsroom";
  const aPhoto=author?.photo;
  const avatarHTML=aPhoto
    ?`<img class="author-avatar" src="${esc(aPhoto)}" alt="${esc(aName)}" loading="lazy"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
      ><div class="author-avatar-ai" style="display:none" aria-label="${esc(aName)}">🤖</div>`
    :`<div class="author-avatar-ai" aria-label="${esc(aName)}">🤖</div>`;

  const pubDate=fmtDate(data.published_at||data.time);
  const updDate=data.updated_at&&data.updated_at!==data.published_at?fmtDate(data.updated_at):null;
  const readTime=data.reading_time?`${data.reading_time} min read`:null;

  const updNotice=updDate?`<div class="updated-notice">✏️ Updated: ${esc(updDate)}</div>`:"";

  const authorRow=`<div class="author-row" dir="ltr">
    ${avatarHTML}
    <div class="author-text"><div class="author-name">${esc(aName)}</div><div class="author-role">${esc(aRole)}</div></div>
    <div class="author-sep"></div>
    <div class="article-dateline">
      <div class="article-dateline-label">Published</div>
      <div class="article-dateline-val"><time datetime="${esc(data.published_at||"")}">${esc(pubDate)}</time></div>
    </div>
    ${readTime?`<div class="article-readtime">${esc(readTime)}</div>`:""}
  </div>`;

  // Body
  const paras=(data.paragraphs?.length?data.paragraphs:String(data.body||"").split(/\n\n+/)).filter(Boolean);
  const bodyHTML=paras.length?paras.map(p=>`<p>${esc(p)}</p>`).join("\n"):`<p>${esc(data.excerpt||data.title||"")}</p>`;

  // Share
  const shareLabel=isDv?"ހިއްސާ ކުރޭ":"Share this story";
  const share=`<div class="share-bar">
    <div class="share-label">${esc(shareLabel)}</div>
    <div class="share-buttons" role="group">
      <a class="share-btn" href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(canonical)}" target="_blank" rel="noopener" aria-label="Facebook"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>Facebook</a>
      <a class="share-btn" href="https://t.me/share/url?url=${encodeURIComponent(canonical)}&text=${encodeURIComponent(data.title||"")}" target="_blank" rel="noopener" aria-label="Telegram"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>Telegram</a>
      <a class="share-btn" href="https://wa.me/?text=${encodeURIComponent((data.title||"")+" "+canonical)}" target="_blank" rel="noopener" aria-label="WhatsApp"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>WhatsApp</a>
      <a class="share-btn" href="https://twitter.com/intent/tweet?text=${encodeURIComponent(data.title||"")}&url=${encodeURIComponent(canonical)}" target="_blank" rel="noopener" aria-label="X"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.213 5.567 5.951-5.567zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>X</a>
      <button class="share-btn" id="copyBtn" aria-label="Copy link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy link</button>
    </div>
  </div>`;

  // Related
  const relLabel=isDv?"ގުޅޭ ޚަބަރުތައް":"Related stories";
  const related=(data.related?.length)?`<section class="related-section">
    <h2 class="related-head">${esc(relLabel)}</h2>
    <div class="related-grid">
      ${data.related.map(r=>`<a class="related-card" href="article.html?id=${esc(r.id||"")}">
        <div class="related-cat">${esc(r.category||"Local")}</div>
        <h3>${esc(r.title)}</h3>
        <p>${esc(r.time||"")}</p>
      </a>`).join("")}
    </div>
  </section>`:"";

  // CTA
  const cta=`<div class="article-cta">
    <div class="article-cta-text">
      <strong>${isDv?"ސަމުގާ ކޮމިއުނިޓީ ފޮލޯ ކުރޭ":"Follow this story on Samuga Community"}</strong>
      <p>${isDv?"ލައިވް ޚަބަރު، ބްރޭކިންގ، ތަފްސީލު.":"Live updates, breaking news, discussions."}</p>
    </div>
    <a class="header-btn primary" href="https://t.me/samugacommunity" target="_blank" rel="noopener">${isDv?"ޖޮއިން ވޭ →":"Join Telegram →"}</a>
  </div>`;

  // Sponsor banner
  const bannerHTML=banner?`<div class="article-banner">
    <div class="article-banner-head ltr-lock"><span>Sponsored</span><span class="ad-badge">Ad</span></div>
    <a class="article-banner-frame" href="${esc(banner.link||"https://samugamedia.com")}" target="_blank" rel="noopener sponsored">
      <img src="${esc(banner.image_url)}" alt="${esc(banner.text||"Sponsored banner")}" loading="lazy">
    </a>
    ${banner.text?`<p class="article-banner-copy">${esc(banner.text)}</p>`:""}
  </div>`:"";

  // Assemble
  const el=$("articleContent");
  el.dir=isDv?"rtl":"ltr";
  el.innerHTML=`
    <header class="article-hero">
      ${updNotice}
      <div class="article-eyebrow">
        <span class="article-cat-tag ${catCls}">${esc(catDisplay)}</span>
        <span class="article-source-line">${esc(data.source||"Samuga Media")}</span>
        ${isBreaking?`<span class="live-badge">Live</span>`:""}
      </div>
      <h1 class="article-headline">${esc(data.title)}</h1>
      ${data.excerpt?`<p class="article-excerpt">${esc(data.excerpt)}</p>`:""}
      ${authorRow}
    </header>
    <div class="article-body">${bodyHTML}</div>
    ${cta}
    ${bannerHTML}
    ${share}
    ${related}`;
  el.style.display="block";

  // Copy button
  const cb=$("copyBtn");
  if(cb) cb.addEventListener("click",async()=>{
    try{
      await navigator.clipboard.writeText(canonical);
      cb.classList.add("copied"); cb.textContent="✓ Copied!";
      setTimeout(()=>{cb.classList.remove("copied");cb.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy link`;},2200);
    }catch{}
  });
}

loadArticle();
</script>
</body>
</html>
